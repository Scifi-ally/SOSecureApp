<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOSecure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDMRIMm__FjOZQOZ9QwfCFagheluY0rjbg&callback=initMap" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --background: #FFFFFF;
            --text: #000000;
            --accent: #000000;
            --shadow: 0 0.5rem 1rem -0.1875rem rgba(0, 0, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.3);
        }

        body {
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 1rem;
        }

        .fade-out-except-enlarging * {
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .fade-out-except-enlarging.active * {
            opacity: 0;
        }

        .fade-out-except-enlarging.active .feature-card.enlarging {
            opacity: 1;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: grid;
            place-items: center;
            z-index: 2000;
            opacity: 1;
            transition: opacity 0.8s ease-out;
        }

        #loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        #loading-icon {
            font-size: 2.5rem;
            color: var(--accent);
            animation: pulseGlow 1.5s infinite ease-in-out;
        }

        #loading-text {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.0625rem;
            margin-top: 1rem;
            color: var(--text);
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        header {
            background: var(--background);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        header i {
            font-size: 1.5rem;
            color: var(--accent);
            margin-right: 0.75rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.125rem;
            color: var(--text);
        }

        header:hover i {
            transform: rotate(360deg);
        }

        .page {
            display: none;
            padding: 4rem 5% 6rem;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .page.active {
            display: block;
            opacity: 1;
        }

        .sos-btn {
            background: red;
            border: none;
            border-radius: 50%;
            width: 8rem;
            height: 8rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--background);
            cursor: pointer;
            margin: 2rem auto;
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .sos-btn::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            top: -50%;
            left: -50%;
            animation: ripple 4s infinite;
            opacity: 0.6;
        }

        .sos-btn:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0.9375rem 1.5625rem rgba(0, 0, 0, 0.2);
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        #stop-sharing-btn {
            background: #ff4444;
            color: var(--background);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem auto;
            display: none;
            transition: all 0.3s ease;
        }

        #stop-sharing-btn:hover {
            transform: translateY(-0.125rem);
            box-shadow: 0 0.5rem 0.9375rem rgba(0, 0, 0, 0.2);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
            gap: 1rem;
            width: 90%;
            margin: 0 auto;
            padding: 1rem 0;
            perspective: 1000px;
        }

        .feature-card {
            background: var(--glass);
            backdrop-filter: blur(0.5rem);
            border: 0.0625rem solid var(--accent);
            border-radius: 1rem;
            padding: 1.5rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .feature-card:hover {
            transform: translateZ(1rem) rotateX(10deg) rotateY(10deg);
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.3);
        }

        .feature-card.enlarging {
            animation: enlarge 0.5s ease forwards;
        }

        @keyframes enlarge {
            0% { transform: scale(1); }
            100% { transform: scale(1.5) translateZ(2rem); }
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.1) 0%, transparent 70%);
            transform: rotate(30deg);
            transition: all 0.6s ease;
            z-index: -1;
        }

        .feature-card:hover::before {
            transform: rotate(0deg) scale(1.2) translateZ(-0.5rem);
        }

        .feature-card i {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
        }

        .feature-card:hover i {
            transform: scale(1.2) translateZ(0.5rem);
        }

        .feature-card p {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
        }

        .feature-card:hover p {
            transform: translateZ(0.3rem);
        }

        .form-container {
            background: var(--glass);
            backdrop-filter: blur(0.75rem);
            border: 0.0625rem solid var(--accent);
            padding: 1.5rem;
            border-radius: 1.25rem;
            margin: 2rem auto;
            width: 90%;
            max-width: 25rem;
            box-shadow: var(--shadow);
            position: relative;
        }

        .form-container h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .form-container input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 0.625rem;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text);
            font-size: 0.9375rem;
            transition: all 0.3s ease;
        }

        .form-container input:focus {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0.9375rem rgba(0, 0, 0, 0.2);
            outline: none;
            transform: scale(1.02);
        }

        .form-container input::placeholder {
            color: var(--text);
            opacity: 0.6;
        }

        .form-container button {
            background: var(--accent);
            color: var(--background);
            border: none;
            padding: 0.75rem;
            width: 100%;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .form-container button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
            opacity: 0;
            transition: all 0.6s ease;
        }

        .form-container button:hover::after {
            opacity: 1;
            transform: scale(1.5);
        }

        .form-container button:hover {
            transform: translateY(-0.1875rem);
            box-shadow: 0 0.75rem 1.25rem rgba(0, 0, 0, 0.2);
        }

        .switch-link {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text);
        }

        .switch-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        #map {
            height: 60vh;
            width: 90%;
            margin: 1.5rem auto;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            border: 0.0625rem solid var(--accent);
        }

        .profile-container {
            background: var(--glass);
            backdrop-filter: blur(0.75rem);
            border: 0.0625rem solid var(--accent);
            padding: 1.5rem;
            border-radius: 1.25rem;
            margin: 2rem auto;
            width: 90%;
            max-width: 25rem;
            box-shadow: var(--shadow);
        }

        .profile-container h2 {
            font-size: 1.375rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .profile-container p {
            font-size: 0.875rem;
            color: var(--text);
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 0.5rem;
        }

        .profile-field input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 0.625rem;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text);
            transition: all 0.3s ease;
        }

        .profile-field input:focus {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 0.9375rem rgba(0, 0, 0, 0.2);
            outline: none;
        }

        .profile-action button {
            background: var(--accent);
            color: var(--background);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 0.9375rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0.5rem 0;
            width: 100%;
        }

        .profile-action button:hover {
            transform: translateY(-0.125rem);
            box-shadow: 0 0.5rem 0.9375rem rgba(0, 0, 0, 0.2);
        }

        #signout-btn {
            background: transparent;
            color: var(--accent);
            border: 0.125rem solid var(--accent);
            padding: 0.75rem 1.5rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 0.9375rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0.5rem 0;
            width: 100%;
        }

        #signout-btn:hover {
            background: var(--accent);
            color: var(--background);
            transform: translateY(-0.125rem);
            box-shadow: 0 0.5rem 0.9375rem rgba(0, 0, 0, 0.2);
        }

        nav {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(0.75rem);
            border: 0.0625rem solid var(--accent);
            border-radius: 3.125rem;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 1rem;
            z-index: 100;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 20rem;
            justify-content: space-around;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        nav button i {
            font-size: 1.25rem;
        }

        nav button:hover {
            color: var(--accent);
            transform: translateY(-0.1875rem);
        }

        nav button.active {
            color: var(--accent);
        }

        nav button.active i {
            animation: glowPulse 1.5s infinite;
        }

        nav button::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0.1875rem;
            background: var(--accent);
            transition: all 0.4s ease;
            transform: translateX(-50%);
            border-radius: 0.125rem;
        }

        nav button.active::before {
            width: 70%;
        }

        #route-instructions {
            background: var(--glass);
            backdrop-filter: blur(0.75rem);
            border: 0.0625rem solid var(--accent);
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1.5rem auto;
            width: 90%;
            max-height: 15rem;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .location-inputs {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1.5rem auto;
            width: 90%;
            max-width: 25rem;
        }

        .location-input {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            border: 0.0625rem solid var(--accent);
            border-radius: 0.75rem;
            transition: all 0.3s ease;
        }

        .location-input:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .location-input i {
            padding: 0.75rem;
            color: var(--accent);
        }

        .location-input input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.75rem;
            color: var(--text);
            font-size: 0.9375rem;
        }

        .location-input input:focus {
            outline: none;
        }

        .route-btn, #current-location-btn {
            background: var(--accent);
            color: var(--background);
            border: none;
            padding: 0.75rem;
            width: 90%;
            max-width: 25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.4s ease;
            margin: 0.5rem auto;
            position: relative;
            overflow: hidden;
        }

        .route-btn:disabled, #current-location-btn:disabled {
            background: var(--text);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .route-btn::after, #current-location-btn::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.2) 0%, transparent 70%);
            top: -50%;
            left: -50%;
            opacity: 0;
            transition: all 0.6s ease;
        }

        .route-btn:hover:not(:disabled)::after, #current-location-btn:hover:not(:disabled)::after {
            opacity: 1;
            transform: scale(1.5);
        }

        .route-btn:hover:not(:disabled), #current-location-btn:hover:not(:disabled) {
            transform: translateY(-0.1875rem);
            box-shadow: 0 0.75rem 1.25rem rgba(0, 0, 0, 0.2);
        }

        #popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: grid;
            place-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(0.25rem);
        }

        #popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #popup-box {
            background: var(--background);
            border-radius: 1.25rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 20rem;
            box-shadow: var(--shadow);
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 0.0625rem solid var(--accent);
        }

        #popup-overlay.active #popup-box {
            transform: scale(1);
        }

        #popup-message {
            font-size: 0.9375rem;
            margin-bottom: 1.5rem;
            color: var(--text);
            line-height: 1.5;
        }

        #popup-close-btn {
            background: var(--accent);
            color: var(--background);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 0.9375rem;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        #popup-close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0.5rem 0.9375rem rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div id="popup-overlay">
        <div id="popup-box">
            <p id="popup-message"></p>
            <button id="popup-close-btn">Close</button>
        </div>
    </div>
    <div id="loading-screen" class="hide">
        <i id="loading-icon" class="fas fa-shield-alt"></i>
        <div id="loading-text">SOSecure Loading...</div>
    </div>
    <header>
        <i class="fas fa-shield-alt"></i>
        <h1>SOSecure</h1>
    </header>
    <div id="home" class="page">
        <button class="sos-btn">SOS</button>
        <button id="stop-sharing-btn" onclick="stopSharing()">Stop Sharing</button>
        <div class="features">
            <div class="feature-card" onclick="triggerFakeCall()">
                <i class="fas fa-phone"></i>
                <p>Fake Call</p>
            </div>
            <div class="feature-card" onclick="transitionToMapPage(this)">
                <i class="fas fa-map"></i>
                <p>Safe Map</p>
            </div>
            <div class="feature-card" onclick="showPopup('Community Alerts Coming Soon!')">
                <i class="fas fa-users"></i>
                <p>Community</p>
            </div>
            <div class="feature-card" onclick="showPopup('Call 911')">
                <i class="fas fa-info-circle"></i>
                <p>Resources</p>
            </div>
        </div>
    </div>
    <div id="signup" class="page">
        <div class="form-container">
            <h2>Sign Up</h2>
            <input id="signup-name" type="text" placeholder="Full Name" required>
            <input id="signup-email" type="email" placeholder="Email" required>
            <input id="signup-password" type="password" placeholder="Password" required>
            <input id="signup-emergency-contacts" type="text" placeholder="Emergency Contacts (e.g., +1234567890,+0987654321)" required>
            <button onclick="signUp()">Sign Up</button>
            <div class="switch-link">
                <p>Already have an account? <a href="#" onclick="showPage('signin')">Sign In</a></p>
            </div>
        </div>
    </div>
    <div id="signin" class="page active">
        <div class="form-container">
            <h2>Sign In</h2>
            <input id="signin-email" type="email" placeholder="Email" required>
            <input id="signin-password" type="password" placeholder="Password" required>
            <button onclick="signIn()">Sign In</button>
            <div class="switch-link">
                <p>Need an account? <a href="#" onclick="showPage('signup')">Sign Up</a></p>
            </div>
        </div>
    </div>
    <div id="map-page" class="page">
        <h2 style="margin: 1.5rem 0; font-size: 1.5rem; font-weight: 700; color: var(--text);">Navigation</h2>
        <div class="location-inputs">
            <div class="location-input">
                <i class="fas fa-map-marker-alt"></i>
                <input id="start-location" type="text" placeholder="Starting Location">
            </div>
            <div class="location-input">
                <i class="fas fa-flag-checkered"></i>
                <input id="end-location" autocomplete="off" type="text" placeholder="Destination">
            </div>
        </div>
        <button class="route-btn" onclick="calculateSafeRoute()" disabled>Find Route</button>
        <button id="current-location-btn" onclick="setCurrentLocation()" disabled>Use Current Location</button>
        <div id="map"></div>
        <div id="route-instructions" style="display: none;">
            <h3>Route Instructions</h3>
            <div id="route-steps"></div>
        </div>
    </div>
    <div id="profile" class="page">
        <div class="profile-container">
            <h2 id="profile-name">Loading...</h2>
            <p id="profile-email">Email: Loading...</p>
            <p id="profile-emergency">Emergency Contacts: Loading...</p>
            <div class="profile-action">
                <button id="edit-profile-btn" onclick="toggleEditProfile()">Edit Profile</button>
            </div>
            <div id="edit-profile-form" style="display: none;">
                <div class="profile-field">
                    <input id="edit-name" type="text" placeholder="Full Name">
                </div>
                <div class="profile-field">
                    <input id="edit-emergency" type="text" placeholder="Emergency Contacts (e.g., +1234567890,+0987654321)">
                </div>
                <div class="profile-action">
                    <button onclick="updateProfile()">Save Changes</button>
                </div>
            </div>
            <button id="signout-btn" onclick="signOut()">Sign Out</button>
        </div>
    </div>
    <nav id="navbar" style="display: none;">
        <button onclick="showPage('home')"><i class="fas fa-home"></i>Home</button>
        <button onclick="showPage('map-page')"><i class="fas fa-map"></i>Maps</button>
        <button onclick="showPage('profile')"><i class="fas fa-user"></i>Profile</button>
    </nav>
    <script>
        let isMapInitialized = false;
        let locationInterval = null;
        const LOCATION_UPDATE_INTERVAL = 30000; // 30 seconds for faster updates

        function showPopup(message) {
            const popupOverlay = document.getElementById('popup-overlay');
            const popupMessage = document.getElementById('popup-message');
            popupMessage.textContent = message;
            popupOverlay.classList.add('active');
        }

        function hidePopup() {
            const popupOverlay = document.getElementById('popup-overlay');
            popupOverlay.classList.remove('active');
        }

        document.getElementById('popup-close-btn').addEventListener('click', hidePopup);

        const firebaseConfig = {
            apiKey: "AIzaSyDxmmnQMTfoTBGarz65NdHm1t3NyxWM-rE",
            authDomain: "soapp-80936.firebaseapp.com",
            projectId: "soapp-80936",
            storageBucket: "soapp-80936.firebasestorage.app",
            messagingSenderId: "152328551150",
            appId: "1:152328551150:web:211ab46d98e41560d1d1ff",
            measurementId: "G-2ZVT8KSKHR"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let map;
        let directionsService;
        let directionsRenderer;
        let currentLocationMarker;

        function initMap() {
            if (!window.google || !window.google.maps) {
                showPopup('Google Maps API failed to load. Please refresh the page.');
                return;
            }

            const defaultLocation = { lat: -34.397, lng: 150.644 };

            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 15,
                center: defaultLocation,
                styles: [
                    { "featureType": "all", "elementType": "geometry", "stylers": [{"color": "#000000"}] },
                    { "featureType": "road", "elementType": "geometry", "stylers": [{"color": "#808080"}] },
                    { "featureType": "water", "elementType": "geometry", "stylers": [{"color": "#1DA1F2"}] },
                    { "featureType": "landscape", "elementType": "geometry", "stylers": [{"color": "#000000"}] },
                    { "featureType": "poi", "elementType": "geometry", "stylers": [{"color": "#000000"}] },
                    { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{"color": "#FFFFFF"}, {"weight": "0.5"}] },
                    { "featureType": "all", "elementType": "labels.text.stroke", "stylers": [{"color": "#000000"}, {"weight": "0.1"}] }
                ]
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                polylineOptions: { strokeColor: "#000000", strokeWeight: 4, strokeOpacity: 1.0 }
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                        map.setCenter(userLocation);
                        currentLocationMarker = new google.maps.Marker({
                            position: userLocation,
                            map: map,
                            title: 'Your Location',
                            icon: { url: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png' }
                        });
                        document.getElementById('start-location').value = `${userLocation.lat}, ${userLocation.lng}`;
                        isMapInitialized = true;
                        document.querySelector('.route-btn').disabled = false;
                        document.getElementById('current-location-btn').disabled = false;
                    },
                    (error) => {
                        let errorMessage = 'Unable to retrieve your location.';
                        switch (error.code) {
                            case error.PERMISSION_DENIED: errorMessage = 'Location permission denied.'; break;
                            case error.POSITION_UNAVAILABLE: errorMessage = 'Location unavailable.'; break;
                            case error.TIMEOUT: errorMessage = 'Location request timed out.'; break;
                        }
                        showPopup(errorMessage);
                        map.setCenter(defaultLocation);
                        isMapInitialized = true;
                        document.querySelector('.route-btn').disabled = false;
                        document.getElementById('current-location-btn').disabled = false;
                    }
                );
            } else {
                showPopup('Geolocation not supported.');
                map.setCenter(defaultLocation);
                isMapInitialized = true;
                document.querySelector('.route-btn').disabled = false;
                document.getElementById('current-location-btn').disabled = false;
            }
        }

        function setCurrentLocation() {
            if (!isMapInitialized || !map || !window.google || !window.google.maps) {
                showPopup('Map not initialized yet.');
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                        map.setCenter(userLocation);
                        if (currentLocationMarker) currentLocationMarker.setMap(null);
                        currentLocationMarker = new google.maps.Marker({
                            position: userLocation,
                            map: map,
                            title: 'Your Location',
                            icon: { url: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png' }
                        });
                        document.getElementById('start-location').value = `${userLocation.lat}, ${userLocation.lng}`;
                    },
                    (error) => {
                        let errorMessage = 'Unable to retrieve your location.';
                        switch (error.code) {
                            case error.PERMISSION_DENIED: errorMessage = 'Location permission denied.'; break;
                            case error.POSITION_UNAVAILABLE: errorMessage = 'Location unavailable.'; break;
                            case error.TIMEOUT: errorMessage = 'Location request timed out.'; break;
                        }
                        showPopup(errorMessage);
                    }
                );
            } else {
                showPopup('Geolocation not supported.');
            }
        }

        function calculateSafeRoute() {
            if (!isMapInitialized || !window.google || !window.google.maps || !directionsService || !directionsRenderer) {
                showPopup('Google Maps API not loaded.');
                return;
            }

            const start = document.getElementById('start-location').value;
            const end = document.getElementById('end-location').value;

            if (!start || !end) {
                showPopup('Enter both start and end locations.');
                return;
            }

            directionsService.route({
                origin: start,
                destination: end,
                travelMode: google.maps.TravelMode.WALKING
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                    const steps = response.routes[0].legs[0].steps.map(step => step.instructions).join('<br>');
                    document.getElementById('route-steps').innerHTML = steps;
                    document.getElementById('route-instructions').style.display = 'block';
                    showPopup('Route calculated successfully!');
                } else {
                    showPopup('Directions request failed: ' + status);
                }
            });
        }

        function updateMapWithSharedLocation() {
            if (!isMapInitialized || !map) return;

            const user = auth.currentUser;
            if (user) {
                db.collection('locationShares').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists && doc.data().active) {
                        const { lat, lng } = doc.data().location;
                        const position = { lat, lng };
                        if (currentLocationMarker) currentLocationMarker.setMap(null);
                        currentLocationMarker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: 'Shared Location',
                            icon: { url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png' }
                        });
                        map.setCenter(position);
                    }
                });
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
                page.style.opacity = '0';
            });
            const targetPage = document.getElementById(pageId);
            targetPage.classList.add('active');
            setTimeout(() => targetPage.style.opacity = '1', 50);
            updateNav(pageId);
            if (pageId === 'map-page' && !isMapInitialized) initMap();
            if (pageId === 'map-page') updateMapWithSharedLocation();
        }

        function updateNav(pageId) {
            document.querySelectorAll('nav button').forEach(button => {
                button.classList.remove('active');
                if (button.getAttribute('onclick') === `showPage('${pageId}')`) button.classList.add('active');
            });
        }

        function transitionToMapPage(card) {
            const body = document.body;
            body.classList.add('fade-out-except-enlarging', 'active');
            card.classList.add('enlarging');

            setTimeout(() => {
                card.classList.remove('enlarging');
                body.classList.remove('active', 'fade-out-except-enlarging');
                showPage('map-page');
            }, 500);
        }

        function triggerFakeCall() {
            showPopup('Fake Call Activated! (Sound not implemented)');
        }

        function getCurrentLocation(callback) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const location = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            timestamp: new Date().toISOString()
                        };
                        callback(location);
                    },
                    (error) => showPopup('Failed to get location: ' + error.message)
                );
            } else {
                showPopup('Geolocation not supported.');
            }
        }

        function shareLocation() {
            const user = auth.currentUser;
            if (!user) {
                showPopup('Please sign in to share your location.');
                return;
            }

            getCurrentLocation((location) => {
                const locationUrl = `https://www.google.com/maps?q=${location.lat},${location.lng}`;
                db.collection('locationShares').doc(user.uid).set({
                    location: location,
                    sharedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    active: true
                }).then(() => {
                    db.collection('users').doc(user.uid).get().then((doc) => {
                        if (doc.exists) {
                            const emergencyContacts = doc.data().emergencyContacts || [];
                            const message = encodeURIComponent(`Emergency: My location at ${new Date().toLocaleString()}: ${locationUrl}`);
                            emergencyContacts.forEach(phone => {
                                const whatsappUrl = `https://wa.me/${phone}?text=${message}`;
                                window.open(whatsappUrl, '_blank'); // Opens WhatsApp chat for each contact
                            });
                        } else {
                            showPopup('No emergency contacts found.');
                        }
                    }).catch((error) => showPopup('Error fetching user data: ' + error.message));
                }).catch((error) => showPopup('Error sharing location: ' + error.message));
            });
        }

        document.querySelector('.sos-btn').addEventListener('click', () => {
            showPopup('SOS Alert Sent! Opening WhatsApp for all emergency contacts... (Please press "Send" in WhatsApp)');
            if (!locationInterval) {
                shareLocation(); // Share immediately
                locationInterval = setInterval(shareLocation, LOCATION_UPDATE_INTERVAL); // Share every 30 seconds
                document.getElementById('stop-sharing-btn').style.display = 'block';
            }
        });

        function stopSharing() {
            if (locationInterval) {
                clearInterval(locationInterval);
                locationInterval = null;
                if (auth.currentUser) {
                    db.collection('locationShares').doc(auth.currentUser.uid).update({ active: false })
                        .then(() => showPopup('Location sharing stopped.'))
                        .catch((error) => showPopup('Error stopping sharing: ' + error.message));
                }
                document.getElementById('stop-sharing-btn').style.display = 'none';
            }
        }

        function showLoadingAnimation() {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.classList.remove('hide');
            setTimeout(() => {
                loadingScreen.classList.add('hide');
            }, 3000);
        }

        function signUp() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const emergencyContactsInput = document.getElementById('signup-emergency-contacts').value;

            if (!name || !email || !password || !emergencyContactsInput) {
                showPopup('Please fill in all fields.');
                return;
            }

            const emergencyContacts = emergencyContactsInput.split(',').map(contact => contact.trim());
            const phoneRegex = /^\+\d{9,15}$/;
            if (!emergencyContacts.every(contact => phoneRegex.test(contact))) {
                showPopup('Please enter valid phone numbers starting with + (e.g., +1234567890), separated by commas.');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    return db.collection('users').doc(user.uid).set({
                        name: name,
                        email: email,
                        emergencyContacts: emergencyContacts,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    showPage('home');
                    document.getElementById('navbar').style.display = 'flex';
                    showLoadingAnimation();
                })
                .catch((error) => {
                    showPopup('Sign Up Error: ' + error.message);
                    console.error('Sign-up error:', error);
                });
        }

        function signIn() {
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            if (!email || !password) {
                showPopup('Please fill in all fields.');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showPage('home');
                    document.getElementById('navbar').style.display = 'flex';
                    loadUserProfile(userCredential.user.uid);
                })
                .catch((error) => {
                    showPopup('Sign In Error: ' + error.message);
                    console.error('Sign-in error:', error);
                });
        }

        function loadUserProfile(userId) {
            db.collection('users').doc(userId).get()
                .then((doc) => {
                    if (doc.exists) {
                        const userData = doc.data();
                        document.getElementById('profile-name').textContent = userData.name;
                        document.getElementById('profile-email').textContent = 'Email: ' + userData.email;
                        document.getElementById('profile-emergency').textContent = 'Emergency Contacts: ' + (userData.emergencyContacts || []).join(', ');
                        document.getElementById('edit-name').value = userData.name;
                        document.getElementById('edit-emergency').value = (userData.emergencyContacts || []).join(', ');
                    } else {
                        showPopup('No profile data found.');
                    }
                }).catch((error) => showPopup('Error loading profile: ' + error.message));
        }

        function toggleEditProfile() {
            const editForm = document.getElementById('edit-profile-form');
            if (editForm.style.display === 'none') {
                editForm.style.display = 'block';
                document.getElementById('edit-profile-btn').textContent = 'Cancel';
            } else {
                editForm.style.display = 'none';
                document.getElementById('edit-profile-btn').textContent = 'Edit Profile';
            }
        }

        function updateProfile() {
            const userId = auth.currentUser.uid;
            const name = document.getElementById('edit-name').value;
            const emergencyContactsInput = document.getElementById('edit-emergency').value;

            if (!name || !emergencyContactsInput) {
                showPopup('Please fill in all fields.');
                return;
            }

            const emergencyContacts = emergencyContactsInput.split(',').map(contact => contact.trim());
            const phoneRegex = /^\+\d{9,15}$/;
            if (!emergencyContacts.every(contact => phoneRegex.test(contact))) {
                showPopup('Please enter valid phone numbers starting with + (e.g., +1234567890), separated by commas.');
                return;
            }

            db.collection('users').doc(userId).update({
                name: name,
                emergencyContacts: emergencyContacts
            })
            .then(() => {
                showPopup('Profile updated!');
                loadUserProfile(userId);
                toggleEditProfile();
            })
            .catch((error) => showPopup('Error updating profile: ' + error.message));
        }

        function signOut() {
            if (locationInterval) {
                clearInterval(locationInterval);
                locationInterval = null;
                if (auth.currentUser) {
                    db.collection('locationShares').doc(auth.currentUser.uid).update({ active: false })
                        .catch((error) => showPopup('Error stopping location sharing: ' + error.message));
                }
                document.getElementById('stop-sharing-btn').style.display = 'none';
            }
            auth.signOut()
                .then(() => {
                    showPopup('Signed out successfully!');
                    document.getElementById('navbar').style.display = 'none';
                    showPage('signin');
                })
                .catch((error) => showPopup('Error signing out: ' + error.message));
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('navbar').style.display = 'flex';
                showPage('home');
                loadUserProfile(user.uid);
                db.collection('locationShares').doc(user.uid).get().then((doc) => {
                    if (doc.exists && doc.data().active) {
                        shareLocation();
                        locationInterval = setInterval(shareLocation, LOCATION_UPDATE_INTERVAL);
                        document.getElementById('stop-sharing-btn').style.display = 'block';
                    }
                });
            } else {
                document.getElementById('navbar').style.display = 'none';
                showPage('signin');
                if (locationInterval) {
                    clearInterval(locationInterval);
                    locationInterval = null;
                    document.getElementById('stop-sharing-btn').style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
