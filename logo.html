<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated SOS with CSS</title>
    <style>
        body {
            background: #000; /* Dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        svg {
            width: 300px;
            height: 100px;
        }

        #sosPath {
            fill: none;
            stroke-width: 8px;
            stroke: url(#gradient);
            stroke-dasharray: 900; /* Set to 900 */
            stroke-dashoffset: 900; /* Set to 900 */
            animation: draw 3s ease-in-out forwards; /* Reveal over 3s */
        }

        /* Gradient animation */
        #gradient {
            animation: shiftGradient 6s linear infinite; /* Moves gradient */
        }

        @keyframes draw {
            0% {
                stroke-dashoffset: 900; /* Start at 900 */
                opacity: 0; /* Fade in */
            }
            20% {
                opacity: 1; /* Fully visible early */
            }
            100% {
                stroke-dashoffset: 0; /* Fully drawn */
            }
        }

        @keyframes shiftGradient {
            0% {
                x1: 0%;
                x2: 100%;
            }
            50% {
                x1: 100%;
                x2: 0%;
            }
            100% {
                x1: 0%;
                x2: 100%;
            }
        }

        /* Pulse animation for the whole SVG */
        svg {
            animation: pulse 0.5s ease-in-out 3s forwards; /* After drawing */
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05); /* Slight bounce */
            }
        }
    </style>
</head>
<body>
    <svg width="300" height="100" viewBox="0 0 300 100">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color: #ff0000;" />    <!-- Red -->
                <stop offset="20%" style="stop-color: #ff8000;" />   <!-- Orange -->
                <stop offset="40%" style="stop-color: #ffff00;" />   <!-- Yellow -->
                <stop offset="60%" style="stop-color: #00ff00;" />   <!-- Green -->
                <stop offset="80%" style="stop-color: #0000ff;" />   <!-- Blue -->
                <stop offset="100%" style="stop-color: #800080;" />  <!-- Purple -->
            </linearGradient>
        </defs>
        <!-- Single continuous "SOS" path -->
        <path id="sosPath" d="M20,80 Q40,20 60,80 M100,80 A20,20 0 1,0 100,40 M160,80 Q180,20 200,80" />
    </svg>
</body>
</html>
